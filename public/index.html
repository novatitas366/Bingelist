<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport: makes the page scale correctly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watchly</title>
    <!-- Google Fonts: Inter loaded from an external CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>

    <!-- Top navigation bar — always visible -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">▶</span>
        <span>Watchly</span>
      </div>

      <!-- Tab buttons — disabled when logged out (app.js toggles t.disabled) -->
      <!-- data-view tells app.js which section to show when each tab is clicked -->
      <nav class="tabs">
        <button class="tab" data-view="search">Search</button>
        <button class="tab" data-view="watchlist">Watchlist</button>
      </nav>

      <!-- Hidden until logged in — app.js toggles all [data-authed-only] elements -->
      <div class="auth-area" data-authed-only hidden>
        <span class="who" id="currentUser"></span>  <!-- filled by app.js with "@username" -->
        <button class="btn btn-ghost" id="logoutBtn">Log out</button>
      </div>
    </header>

    <main class="container">

      <!-- ===== LOGIN / REGISTER VIEW ===== -->
      <!-- Shown by app.js when no JWT is stored in localStorage -->
      <section id="view-auth" class="view">
        <div class="auth-card">
          <h1>Welcome to Watchly</h1>
          <p class="muted">Track the shows you love.</p>

          <!-- Toggle between Login and Sign up modes (app.js reads data-mode) -->
          <div class="auth-toggle">
            <button class="toggle on" data-mode="login">Log in</button>
            <button class="toggle"    data-mode="register">Sign up</button>
          </div>

          <!-- Single form used for both login and register — app.js switches the label/action -->
          <form id="authForm" class="stack">
            <label>
              Username
              <input name="username" autocomplete="username" required minlength="3" maxlength="32" />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" required minlength="8" />
            </label>
            <button class="btn btn-primary" type="submit">Log in</button>
            <!-- Error message shown below the form on login/register failure -->
            <p class="error" id="authError" hidden></p>
          </form>
        </div>
      </section>

      <!-- ===== SEARCH VIEW ===== -->
      <!-- Controlled by search.js — calls GET /api/shows/search?q=... -->
      <section id="view-search" class="view" hidden>
        <h2>Search shows</h2>
        <form id="searchForm" class="row">
          <input id="searchInput" type="search" placeholder="e.g. Breaking Bad" />
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
        <!-- Show result cards are injected here by search.js -->
        <div id="searchResults" class="grid"></div>
      </section>

      <!-- ===== WATCHLIST VIEW ===== -->
      <!-- Controlled by watchlist.js — calls GET /api/watchlist with Authorization header -->
      <section id="view-watchlist" class="view" hidden>
        <h2>My watchlist</h2>
        <!-- Filter chips — clicking one re-renders cards from memory, no new HTTP request -->
        <!-- data-status values match the CHECK constraint in the watchlist table -->
        <div class="filter-bar" id="statusFilter">
          <button class="chip on" data-status="all">All</button>
          <button class="chip" data-status="plan_to_watch">Plan to watch</button>
          <button class="chip" data-status="watching">Watching</button>
          <button class="chip" data-status="watched">Watched</button>
          <button class="chip" data-status="dropped">Dropped</button>
        </div>
        <!-- Watchlist cards injected here by watchlist.js -->
        <div id="watchlistGrid" class="grid"></div>
        <!-- Shown when the list is empty or no cards match the active filter -->
        <p id="watchlistEmpty" class="muted" hidden>Nothing here yet — add a show from the Search tab.</p>
      </section>


    </main>

    <!-- Toast notification — shown briefly by toast.js at the bottom of the screen -->
    <div id="toast" class="toast" hidden></div>


    <!-- Single JS entry point — type="module" enables ES import/export syntax -->
    <!-- All other JS files are loaded transitively via imports inside app.js -->
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
