<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watchly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">▶</span>
        <span>Watchly</span>
      </div>
      <nav class="tabs">
        <button class="tab" data-view="search">Search</button>
        <button class="tab" data-view="watchlist">Watchlist</button>
        <button class="tab" data-view="episodes">Episodes</button>
      </nav>
      <div class="auth-area" data-authed-only hidden>
        <span class="who" id="currentUser"></span>
        <button class="btn btn-ghost" id="logoutBtn">Log out</button>
      </div>
    </header>

    <main class="container">
      <!-- Login/register -->
      <section id="view-auth" class="view">
        <div class="auth-card">
          <h1>Welcome to Watchly</h1>
          <p class="muted">Track the shows you love.</p>

          <div class="auth-toggle">
            <button class="toggle on" data-mode="login">Log in</button>
            <button class="toggle" data-mode="register">Sign up</button>
          </div>

          <form id="authForm" class="stack">
            <label>
              Username
              <input name="username" autocomplete="username" required minlength="3" maxlength="32" />
            </label>
            <label>
              Password
              <input name="password" type="password" autocomplete="current-password" required minlength="8" />
            </label>
            <button class="btn btn-primary" type="submit">Log in</button>
            <p class="error" id="authError" hidden></p>
          </form>
        </div>
      </section>

      <!-- Search -->
      <section id="view-search" class="view" hidden>
        <h2>Search shows</h2>
        <form id="searchForm" class="row">
          <input id="searchInput" type="search" placeholder="e.g. Breaking Bad" />
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
        <div id="searchResults" class="grid"></div>
      </section>

      <!-- Watchlist -->
      <section id="view-watchlist" class="view" hidden>
        <h2>My watchlist</h2>
        <div class="filter-bar" id="statusFilter">
          <button class="chip on" data-status="all">All</button>
          <button class="chip" data-status="plan_to_watch">Plan to watch</button>
          <button class="chip" data-status="watching">Watching</button>
          <button class="chip" data-status="watched">Watched</button>
          <button class="chip" data-status="dropped">Dropped</button>
        </div>
        <div id="watchlistGrid" class="grid"></div>
        <p id="watchlistEmpty" class="muted" hidden>Nothing here yet — add a show from the Search tab.</p>
      </section>

      <!-- Episodes -->
      <section id="view-episodes" class="view" hidden>
        <div class="episodes-header">
          <button class="btn btn-ghost" id="backToWatchlist">← Back</button>
          <h2 id="episodesTitle">Episodes</h2>
        </div>
        <p id="episodesHint" class="muted">Pick a show from your watchlist to track episodes.</p>
        <div id="episodesBody"></div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>

    <div id="modal-backdrop" class="modal-backdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
        <div class="modal-inner">
          <div class="modal-poster" id="modalPoster"></div>
          <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-summary" id="modalSummary"></div>
            <div id="modalCast"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
